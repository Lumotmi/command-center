<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center — Livesystems AG</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Bebas+Neue&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<script src="/shared/api.js"></script>
<style>
:root {
  --bg:#f2f0eb; --surface:#ffffff; --ink:#0e0e0e; --ink-2:#3a3a3a;
  --ink-3:#888; --ink-4:#bbb; --accent:#d63a2f; --accent-dim:rgba(214,58,47,.1);
  --border:#d8d4cc; --border-dark:#0e0e0e;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif; --display:'Bebas Neue',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:14px;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1080px;margin:0 auto;padding:0 40px;}

/* topbar */
.topbar{border-bottom:2px solid var(--border-dark);position:sticky;top:0;z-index:100;background:var(--bg);}
.tb{max-width:1080px;margin:0 auto;padding:0 40px;display:flex;align-items:stretch;height:52px;}
.tb-logo{font-family:var(--display);font-size:22px;letter-spacing:.04em;display:flex;align-items:center;padding-right:28px;border-right:1px solid var(--border);color:var(--ink);text-decoration:none;}
.tb-logo span{color:var(--accent);}
.tb-nav{display:flex;align-items:stretch;}
.tb-nav a{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);text-decoration:none;display:flex;align-items:center;padding:0 18px;border-right:1px solid var(--border);transition:color .15s,background .15s;}
.tb-nav a:hover{color:var(--ink);background:rgba(0,0,0,.03);}
.tb-nav a.cur{color:var(--accent);}
.tb-right{display:flex;align-items:center;gap:16px;margin-left:auto;}
.tb-date{font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.05em;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* hero */
.hero{padding:52px 0 44px;border-bottom:1px solid var(--border);}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px;}
.hero-title{font-family:var(--display);font-size:76px;line-height:.9;letter-spacing:.02em;}
.hero-title span{color:var(--accent);}
.hero-stats{display:flex;margin-top:32px;border:1px solid var(--border-dark);}
.hst{padding:16px 28px;border-right:1px solid var(--border-dark);}
.hst:last-child{border-right:none;}
.hst-v{font-family:var(--display);font-size:34px;line-height:1;}
.hst-v.r{color:var(--accent);}
.hst-l{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-top:4px;}

/* sections */
.sec{padding:44px 0;border-bottom:1px solid var(--border);}
.sec:last-child{border-bottom:none;padding-bottom:80px;}
.sec-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;}
.sec-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);}
.sec-title{font-family:var(--display);font-size:26px;letter-spacing:.04em;color:var(--ink);margin-top:4px;}

/* space rows */
.space-row{display:grid;grid-template-columns:220px 1fr 160px;align-items:center;gap:28px;padding:18px 0;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;transition:all .15s;cursor:pointer;}
.space-row:last-child{border-bottom:none;}
.space-row:hover{background:rgba(0,0,0,.025);margin:0 -40px;padding:18px 40px;}
.space-row:hover .sp-arrow{opacity:1;transform:translateX(0);}
.sp-name{font-family:var(--display);font-size:21px;letter-spacing:.04em;}
.sp-sub{font-family:var(--mono);font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3);margin-top:3px;}
.sp-desc{font-size:12px;color:var(--ink-2);line-height:1.55;font-weight:300;}
.sp-right{display:flex;align-items:center;justify-content:flex-end;gap:12px;}
.badge{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border:1px solid var(--border);color:var(--ink-3);white-space:nowrap;}
.badge.red{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.sp-arrow{font-family:var(--mono);font-size:16px;color:var(--accent);opacity:0;transform:translateX(-8px);transition:all .2s;}

/* bottom 2-col */
.two{display:grid;grid-template-columns:1fr 1fr;gap:40px;}

/* week */
.week{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border:1px solid var(--border-dark);}
.wd{background:var(--bg);padding:14px 10px;text-align:center;}
.wd.spec{background:var(--surface);}
.wd.today{background:var(--ink);}
.wd-n{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:5px;}
.wd.today .wd-n{color:rgba(255,255,255,.45);}
.wd-l{font-family:var(--display);font-size:13px;letter-spacing:.04em;color:var(--ink);}
.wd.today .wd-l{color:#fff;}
.wd.spec .wd-l{color:var(--accent);}

/* tasks */
.ti-row{display:flex;border:1px solid var(--border-dark);}
.ti{flex:1;border:none;outline:none;background:transparent;font-family:var(--mono);font-size:11px;color:var(--ink);padding:11px 14px;}
.ti::placeholder{color:var(--ink-4);}
.ti-btn{background:var(--ink);color:#fff;border:none;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:0 18px;cursor:pointer;transition:background .15s;}
.ti-btn:hover{background:var(--accent);}
.t-list{border:1px solid var(--border);border-top:none;}
.t-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;transition:background .15s;}
.t-item:last-child{border-bottom:none;}
.t-item:hover{background:rgba(0,0,0,.02);}
.t-cb{width:13px;height:13px;border:1px solid var(--border-dark);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;transition:all .15s;}
.t-item.done .t-cb{background:var(--ink);color:#fff;}
.t-item.done .t-txt{text-decoration:line-through;color:var(--ink-4);}
.t-txt{flex:1;color:var(--ink-2);}
.t-tag{font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-4);padding:1px 5px;border:1px solid var(--border);}
.t-tag.spoc{color:var(--accent);border-color:var(--accent);}
.t-x{color:var(--ink-4);cursor:pointer;opacity:0;font-size:14px;line-height:1;}
.t-item:hover .t-x{opacity:1;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.space-row{animation:fadeUp .3s ease both;}
.space-row:nth-child(1){animation-delay:.05s}.space-row:nth-child(2){animation-delay:.10s}
.space-row:nth-child(3){animation-delay:.15s}.space-row:nth-child(4){animation-delay:.20s}
.space-row:nth-child(5){animation-delay:.25s}.space-row:nth-child(6){animation-delay:.30s}

@media(max-width:700px){
  .hero-title{font-size:48px}
  .space-row,.space-row:hover{grid-template-columns:1fr;margin:0;padding:16px 0}
  .two{grid-template-columns:1fr}
  .tb-nav{display:none}
}

/* model selector */
.model-sel-wrap{position:relative;display:flex;align-items:center;}
.model-sel{font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:var(--ink-3);padding:5px 26px 5px 9px;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;transition:all .15s;}
.model-sel:hover,.model-sel:focus{border-color:var(--border-dark);color:var(--ink);}
.model-sel.local{border-color:#2a7a2a;color:#2a7a2a;}
.model-sel-arrow{position:absolute;right:7px;pointer-events:none;font-size:8px;color:var(--ink-3);}
.model-indicator{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.model-indicator.cloud{background:var(--accent);}
.model-indicator.local{background:#2a7a2a;}

</style>
</head>
<body>
<div class="topbar">
  <div class="tb">
    <a class="tb-logo" href="/command-center.html">LS<span>.</span>AG</a>
    <nav class="tb-nav">
      <a href="/spoc-hub.html">SPOC</a>
      <a href="/team-lead.html">Team</a>
      <a href="/project-hub.html">Projects</a>
      <a href="/email-analytics.html">Analytics</a>
      <a href="/weekly-rhythm.html">Rhythm</a>
      <a href="/crm-hubspot.html">CRM</a>
    </nav>
    <div class="tb-right">
      <div class="model-sel-wrap">
        <select class="model-sel" id="modelSel" onchange="onModelChange()">
<optgroup label="Local (Ollama)">
            <option value="local|glm-4.7-flash:latest">GLM-4.7 Flash ⚡</option>
            <option value="local|qwen3.6:latest">Qwen3.6</option>
            <option value="local|qwen3:14b">Qwen3 14b</option>
          </optgroup>
        </select>
        <span class="model-sel-arrow">▾</span>
      </div>
      <div class="model-indicator cloud" id="modelDot" title="Model routing indicator"></div>
      <div class="tb-date" id="topDate"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="hero">
    <div class="eyebrow" id="orgEyebrow">Livesystems AG — Personal OS</div>
    <div class="hero-title" id="heroT">GOOD<br><span>MORNING</span></div>
    <div class="hero-stats">
      <div class="hst"><div class="hst-v" id="statMembers">—</div><div class="hst-l">Team members</div></div>
      <div class="hst"><div class="hst-v r" id="statT">—</div><div class="hst-l">Open tasks</div></div>
      <div class="hst"><div class="hst-v" id="statProjects">—</div><div class="hst-l">Active projects</div></div>
      <div class="hst"><div class="hst-v r" id="statBlocked">—</div><div class="hst-l">Blocked</div></div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-hd">
      <div><div class="sec-label">Navigation</div><div class="sec-title">Your Spaces</div></div>
    </div>
    <div id="spaceRows"></div>
  </div>

  <div class="sec">
    <div class="two">
      <div>
        <div class="sec-label" style="margin-bottom:14px;">Weekly Rhythm</div>
        <div class="week" id="weekRow"></div>
      </div>
      <div>
        <div class="sec-label" style="margin-bottom:0;">Quick Tasks</div>
        <div class="ti-row" style="margin-top:14px;">
          <input class="ti" id="taskIn" placeholder="Add task — press Enter" onkeydown="if(event.key==='Enter')addTask()">
          <button class="ti-btn" onclick="addTask()">Add</button>
        </div>
        <div class="t-list" id="taskList"></div>
      </div>
    </div>
  </div>
</div>

<script>
const now = new Date();
const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
document.getElementById('topDate').textContent=`${days[now.getDay()].slice(0,3).toUpperCase()} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
const h=now.getHours();
document.getElementById('heroT').innerHTML=`GOOD<br><span>${h<12?'MORNING':h<17?'AFTERNOON':'EVENING'}</span>`;

const wDays=[{n:'Mon',l:'Outlook',s:true},{n:'Tue',l:'—'},{n:'Wed',l:'—'},{n:'Thu',l:'—'},{n:'Fri',l:'Lookback',s:true}];
const wr=document.getElementById('weekRow');
wDays.forEach((d,i)=>{
  const today=(i+1)===now.getDay();
  const div=document.createElement('div');
  div.className='wd'+(today?' today':d.s?' spec':'');
  div.innerHTML=`<div class="wd-n">${d.n}</div><div class="wd-l">${d.l}</div>`;
  wr.appendChild(div);
});

let tasks=[], spaces=[];
function render(){
  const list=document.getElementById('taskList');list.innerHTML='';
  if(!tasks.length){list.innerHTML='<div class="t-item" style="color:var(--ink-3);font-size:10px;justify-content:center;">No open tasks</div>';document.getElementById('statT').textContent='0';return;}
  tasks.slice(0,6).forEach(t=>{
    const el=document.createElement('div');el.className='t-item'+(t.done?' done':'');
    el.innerHTML=`<div class="t-cb" onclick="tog(${t.id})">${t.done?'✓':''}</div><div class="t-txt">${t.text}</div><div class="t-tag${t.tag==='SPOC'?' spoc':''}">${t.tag||''}</div><div class="t-x" onclick="del(${t.id})">×</div>`;
    list.appendChild(el);
  });
  document.getElementById('statT').textContent=tasks.filter(t=>!t.done).length;
}
async function addTask(){const v=document.getElementById('taskIn').value.trim();if(!v)return;try{await API.addTask(v,'General','medium');document.getElementById('taskIn').value='';await loadData();}catch(e){console.error(e);}}
async function tog(id){const t=tasks.find(x=>x.id===id);if(!t)return;try{await API.updateTask(id,{done:!t.done});await loadData();}catch(e){console.error(e);}}
async function del(id){try{await API.deleteTask(id);await loadData();}catch(e){console.error(e);}}
function setBadge(id,text,red){const el=document.getElementById(id);if(!el)return;el.textContent=text;el.className=red?'badge red':'badge';}

function applyBadge(id,count){
  const el=document.getElementById(id);if(!el)return;
  if(count===0){el.style.display='none';}
  else{el.style.display='';el.textContent=count;el.className='badge red';}
}

async function refreshBadges(){
  if(!spaces.length)return;
  try{
    const [tasksData,spocData,teamData,projectsData,remindersData]=await Promise.all([
      API.getTasks(false),API.getSpoc(),API.getTeam(),API.getProjects(),API.getReminders()
    ]);
    const projs=projectsData.projects||[];
    const counts={
      tasks:(tasksData.tasks||[]).length,
      spoc:(spocData.spoc_log||[]).filter(e=>e.status!=='done').length,
      team:(teamData.team||[]).filter(m=>m.health<7).length,
      projects:projs.filter(p=>p.status==='blocked'||p.status==='atrisk').length,
      crm:projs.filter(p=>p.id==='hubspot'&&(p.status==='atrisk'||p.status==='blocked')).length,
      rhythm:(remindersData.reminders||[]).filter(r=>!r.sent).length
    };
    spaces.forEach(sp=>{
      if(!sp.badge_id||!(sp.id in counts))return;
      applyBadge(sp.badge_id,counts[sp.id]);
    });
  }catch(e){console.error('Badge refresh error:',e);}
}

function buildSpaceRows(spaces){
  const container=document.getElementById('spaceRows');
  if(!container||!spaces)return;
  container.innerHTML='';
  spaces.forEach(sp=>{
    const a=document.createElement('a');
    a.className='space-row';a.href=sp.href;
    const sub=sp.sub_id
      ?`<div class="sp-sub" id="${sp.sub_id}">— Direct Reports</div>`
      :`<div class="sp-sub">${sp.sub||''}</div>`;
    const badge=sp.badge_id
      ?`<span class="badge" id="${sp.badge_id}">—</span>`
      :`<span class="badge">${sp.badge_static||''}</span>`;
    a.innerHTML=`<div><div class="sp-name">${sp.name}</div>${sub}</div><div class="sp-desc">${sp.desc||''}</div><div class="sp-right">${badge}<span class="sp-arrow">→</span></div>`;
    container.appendChild(a);
  });
}

async function loadData(){
  try{
    const [tasksData,teamData,projectsData,cfgData]=await Promise.all([API.getTasks(false),API.getTeam(),API.getProjects(),API.getConfig()]);
    tasks=tasksData.tasks||[];
    const team=teamData.team||[];
    const projects=projectsData.projects||[];
    const cfg=cfgData||{};
    if(cfg.org){document.getElementById('orgEyebrow').textContent=`${cfg.org} — ${cfg.org_subtitle||'Personal OS'}`;}
    if(cfg.ollama_base)OLLAMA_BASE=cfg.ollama_base;
    spaces=cfg.spaces||[];
    if(cfg.spaces){buildSpaceRows(cfg.spaces);refreshBadges();}
    document.getElementById('statMembers').textContent=team.length||'—';
    const active=projects.filter(p=>p.status!=='done');
    const blocked=projects.filter(p=>p.status==='blocked');
    document.getElementById('statProjects').textContent=active.length;
    document.getElementById('statBlocked').textContent=blocked.length;
    document.getElementById('statBlocked').className=blocked.length?'hst-v r':'hst-v';
    const teamSub=document.getElementById('teamSub');
    if(teamSub)teamSub.textContent=team.length+' Direct Reports';
    hideOfflineBanner();
  }catch(e){showOfflineBanner();console.error('API error:',e);}
  render();
}
document.getElementById('taskList').innerHTML='<div class="t-item" style="color:var(--ink-3);font-size:10px;justify-content:center;">Loading...</div>';
startAutoRefresh(loadData,30000);

// ── Model switcher ────────────────────────────────────────────────────────────
const MODEL_KEY = 'ls-model';
let OLLAMA_BASE = 'http://localhost:11434';

function getModel(){
  return localStorage.getItem(MODEL_KEY) || 'local|qwen3:14b';
}

function onModelChange(){
  const val = document.getElementById('modelSel')?.value;
  if(val){ localStorage.setItem(MODEL_KEY, val); updateModelUI(); }
}

function updateModelUI(){
  const val = getModel();
  const [type] = val.split('|');
  const sel = document.getElementById('modelSel');
  const dot = document.getElementById('modelDot');
  if(sel) sel.value = val;
  if(dot){ dot.className = 'model-indicator ' + (type==='local'?'local':'cloud'); }
  if(sel){ sel.className = 'model-sel' + (type==='local'?' local':''); }
}

// Drop-in replacement for every API call in the dashboards.
// Usage: const data = await callAI(systemOrUserPrompt, maxTokens)
async function callAI(prompt, maxTokens=1000){
  const val = getModel();
  const [type, model] = val.split('|');

  if(type === 'local'){
    // Ollama OpenAI-compatible endpoint
    const res = await fetch(`${OLLAMA_BASE}/v1/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model,
        max_tokens: maxTokens,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if(!res.ok){
      const err = await res.text();
      throw new Error(`Ollama error ${res.status}: ${err.slice(0,200)}`);
    }
    const data = await res.json();
    // OpenAI-compatible response shape
    const text = data.choices?.[0]?.message?.content;
    if(!text) throw new Error('Ollama returned no content. Is the model loaded? Run: ollama run ' + model);
    return text;

  } else {
    // Anthropic cloud
    const apiKey = localStorage.getItem('ls-api-key') || '';
    if(!apiKey){ throw new Error('No Anthropic API key set. Click the key icon (🔑) in the toolbar to add it.'); }
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model,
        max_tokens: maxTokens,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    if(!res.ok || data.error){
      throw new Error(data.error?.message || `HTTP ${res.status}`);
    }
    const block = Array.isArray(data.content) && data.content.find(c => c.type === 'text');
    if(!block?.text) throw new Error('API returned no text content');
    return block.text;
  }
}

// Helper: parse JSON safely from model output (strips markdown fences)
function safeJSON(raw){
  if(!raw) return null;
  const cleaned = raw.replace(/^```json\s*/i,'').replace(/^```/,'').replace(/```\s*$/,'').trim();
  const s = cleaned.indexOf('{'), e = cleaned.lastIndexOf('}');
  if(s===-1||e===-1) throw new Error('No JSON object found in response');
  return JSON.parse(cleaned.slice(s, e+1));
}

// Init on page load
document.addEventListener('DOMContentLoaded', ()=>{
  updateModelUI();
  setInterval(refreshBadges, 60000);
});
updateModelUI();

</script>
</body>
</html>
